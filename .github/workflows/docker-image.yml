name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Docker login
        env:
         username: ${{ secrets.DOCKER_USER }}
         password: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "Iniciando login"
          docker login -u "$username" -p "$password"
          echo "Fin login"

      - name: Build Docker image
        run: |
          docker build -t jhoncastaneda22/docker-graphl:0.0.3 .

      - name: Push Docker image
        run: |
          docker push jhoncastaneda22/docker-graphl:0.0.3

      
   
