name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code    
      uses: actions/checkout@v4
      with:
          fetch.depth: 0

    - name: Dokcer login
      env:
        DOCKER_USER: ${{ secrets.DOCKER_USER }}
        DOCKER_Password: ${{ secrets.DOCKER_PASSWORD }}

      run: 
        echo "Iniando login"
        docker login -u $DOCKER_USER -P $DOCKER_PASSWORD
        echo "Fin login"

    - name: Build Docker image
			run: |
				docker build -t jhoncastaneda22/docker-graphl:0.0.3 .

		-namw: Push Docker image
			run: | 
				docker push jhoncastaneda22/docker-graphl:0.0.2
      

      
   
